version: '3.8'

services:
  service-a:
    build:
      context: ./service-a
    ports:
      - "8080:8080"
    environment:
      - SERVICE_B_URL=http://service-b:8081
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4318
    depends_on:
      - service-b
      - otel-collector
    networks:
      - otel-net

  service-b:
    build:
      context: ./service-b
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4318
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    depends_on:
      - otel-collector
    networks:
      - otel-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - zipkin
    networks:
      - otel-net

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"
    networks:
      - otel-net

networks:
  otel-net:
    driver: bridge
